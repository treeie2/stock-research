<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导入股票数据 - 个股研究数据库</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --bg-card: #0f1623;
            --bg-row-hover: #131d2e;
            --border: rgba(99,179,237,0.1);
            --border-h: rgba(99,179,237,0.3);
            --cyan: #06b6d4;
            --blue: #3b82f6;
            --green: #10b981;
            --rose: #f43f5e;
            --amber: #f59e0b;
            --t1: #e2e8f0;
            --t2: #94a3b8;
            --t3: #4b5563;
            --mono: 'JetBrains Mono', monospace;
            --r: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh;
        }
        body::before {
            content:'';
            position:fixed;
            inset:0;
            z-index:0;
            pointer-events:none;
            background:
                radial-gradient(ellipse 80% 40% at 15% 0%, rgba(59,130,246,.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 85% 80%, rgba(6,182,212,.04) 0%, transparent 50%);
        }
        .nav {
            position:sticky;
            top:0;
            z-index:100;
            background:rgba(8,12,20,.9);
            backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            display:flex;
            align-items:center;
            gap:.5rem;
            height:56px;
            padding:0 1.5rem;
        }
        .nav-brand {
            font-weight:700;
            font-size:.9rem;
            letter-spacing:.12em;
            color:var(--cyan);
            text-decoration:none;
            display:flex;
            align-items:center;
            gap:.45rem;
            margin-right:.75rem;
        }
        .nav-link {
            padding:.3rem .75rem;
            border-radius:6px;
            color:var(--t2);
            text-decoration:none;
            font-size:.78rem;
            font-weight:500;
            transition:all .18s;
        }
        .nav-link:hover { color:var(--t1); background:rgba(255,255,255,.05); }
        .wrap {
            position:relative;
            z-index:1;
            max-width:900px;
            margin:0 auto;
            padding:2rem 1.5rem;
        }
        .page-title {
            font-size:1.5rem;
            font-weight:600;
            margin-bottom:.5rem;
        }
        .page-sub {
            color:var(--t2);
            font-size:.85rem;
            margin-bottom:2rem;
        }
        .card {
            background:var(--bg-card);
            border:1px solid var(--border);
            border-radius:var(--r);
            padding:1.5rem;
            margin-bottom:1.5rem;
        }
        .card-title {
            font-size:1rem;
            font-weight:600;
            margin-bottom:1rem;
            color:var(--cyan);
        }
        textarea {
            width:100%;
            min-height:400px;
            background:rgba(0,0,0,.3);
            border:1px solid var(--border);
            border-radius:var(--r);
            padding:1rem;
            color:var(--t1);
            font-family:var(--mono);
            font-size:.8rem;
            line-height:1.5;
            resize:vertical;
        }
        textarea:focus {
            outline:none;
            border-color:var(--cyan);
        }
        .btn {
            background:linear-gradient(135deg, var(--blue), var(--cyan));
            color:#fff;
            border:none;
            padding:.6rem 1.5rem;
            border-radius:var(--r);
            font-size:.85rem;
            font-weight:500;
            cursor:pointer;
            transition:all .2s;
            margin-top:1rem;
        }
        .btn:hover { opacity:.9; transform:translateY(-1px); }
        .btn:disabled { opacity:.5; cursor:not-allowed; }
        .result {
            margin-top:1rem;
            padding:1rem;
            border-radius:var(--r);
            font-size:.85rem;
            display:none;
        }
        .result.success { background:rgba(16,185,129,.1); border:1px solid var(--green); color:var(--green); }
        .result.error { background:rgba(244,63,94,.1); border:1px solid var(--rose); color:var(--rose); }
        .instructions {
            color:var(--t2);
            font-size:.8rem;
            line-height:1.6;
            margin-bottom:1rem;
        }
        .instructions code {
            background:rgba(255,255,255,.1);
            padding:.1rem .3rem;
            border-radius:4px;
            font-family:var(--mono);
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">CYBERRESEARCH</a>
        <a href="/" class="nav-link">仪表板</a>
        <a href="/stocks" class="nav-link">股票列表</a>
        <a href="/social-security-new" class="nav-link">社保新进</a>
        <a href="/concepts" class="nav-link">概念大全</a>
        <a href="/update-stocks" class="nav-link">📥 导入数据</a>
    </nav>
    
    <div class="wrap">
        <div class="page-title">📥 导入股票数据</div>
        <div class="page-sub">将JSON格式的股票数据导入到 stocks_master.json</div>
        
        <div class="card">
            <div class="card-title">数据格式说明</div>
            <div class="instructions">
                <p>请输入符合以下格式的JSON数据：</p>
                <pre style="background:rgba(0,0,0,.3);padding:1rem;border-radius:var(--r);margin:.5rem 0;overflow-x:auto;"><code>{
  "stocks": [
    {
      "name": "股票名称",
      "code": "股票代码",
      "board": "SZ/SH",
      "articles": [...]
    }
  ]
}</code></pre>
                <p>• 如果股票代码已存在，将合并文章数据（自动去重）</p>
                <p>• 如果股票代码不存在，将创建新股票条目</p>
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">JSON 数据</div>
            <textarea id="jsonInput" placeholder='{"stocks": [{"name": "...", "code": "...", ...}]}'></textarea>
            <button class="btn" id="submitBtn" onclick="submitData()">🚀 导入数据</button>
            <div id="result" class="result"></div>
        </div>
    </div>
    
    <script>
        async function submitData() {
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('result');
            const input = document.getElementById('jsonInput').value;
            
            if (!input.trim()) {
                result.className = 'result error';
                result.textContent = '请输入JSON数据';
                result.style.display = 'block';
                return;
            }
            
            let data;
            try {
                data = JSON.parse(input);
            } catch (e) {
                result.className = 'result error';
                result.textContent = 'JSON格式错误: ' + e.message;
                result.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '导入中...';
            result.style.display = 'none';
            
            try {
                const response = await fetch('/api/update-stocks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const res = await response.json();
                
                if (res.success) {
                    result.className = 'result success';
                    result.textContent = `✅ 导入成功！新增 ${res.result.new} 只股票，更新 ${res.result.updated} 只股票`;
                } else {
                    result.className = 'result error';
                    result.textContent = '❌ 导入失败: ' + (res.error || '未知错误');
                }
            } catch (e) {
                result.className = 'result error';
                result.textContent = '❌ 请求失败: ' + e.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 导入数据';
                result.style.display = 'block';
            }
        }
    </script>
</body>
</html>
