<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>搜索</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow p-4">
        <div class="max-w-7xl mx-auto flex gap-4">
            <a href="/" class="text-blue-600">仪表板</a>
            <a href="/stocks">股票列表</a>
            <a href="/concepts">概念大全</a>
            <a href="/search" class="font-bold">搜索</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto p-4">
        <div class="bg-white rounded shadow p-6 mb-4">
            <h1 class="text-2xl font-bold mb-4">🔍 搜索</h1>
            <form class="flex gap-2">
                <input type="text" name="q" value="{{ query }}" placeholder="输入股票名称或代码" 
                       class="flex-1 px-4 py-2 border rounded-lg">
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">搜索</button>
            </form>
        </div>

        {% if query %}
        <div class="bg-white rounded shadow">
            <div class="p-4 border-b">搜索结果：{{ total }} 条</div>
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-2 text-left">股票</th>
                        <th class="px-4 py-2 text-left">提及</th>
                        <th class="px-4 py-2 text-left">概念</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in results %}
                    <tr class="border-t hover:bg-gray-50">
                        <td class="px-4 py-2">
                            <a href="/stock/{{ r.code }}" class="text-blue-600 font-bold">{{ r.name }} ({{ r.code }})</a>
                        </td>
                        <td class="px-4 py-2">{{ r.mention_count }}</td>
                        <td class="px-4 py-2">
                            {% for c in r.concepts %}
                            <a href="/concept/{{ c }}" class="px-2 py-1 bg-blue-100 text-xs rounded mr-1">{{ c }}</a>
                            {% endfor %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% endif %}
    </main>
</body>
</html>
