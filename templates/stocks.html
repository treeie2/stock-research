<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>股票列表</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow p-4">
        <div class="max-w-7xl mx-auto flex gap-4">
            <a href="/" class="text-blue-600">仪表板</a>
            <a href="/stocks" class="font-bold">股票列表</a>
            <a href="/concepts">概念大全</a>
            <a href="/search">搜索</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">股票列表 ({{ total }})</h1>
        <div class="bg-white rounded shadow overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-2 text-left">代码</th>
                        <th class="px-4 py-2 text-left">名称</th>
                        <th class="px-4 py-2 text-left">提及</th>
                        <th class="px-4 py-2 text-left">概念</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in stocks %}
                    <tr class="border-t hover:bg-gray-50">
                        <td class="px-4 py-2 font-mono">{{ s.code }}</td>
                        <td class="px-4 py-2">
                            <a href="/stock/{{ s.code }}" class="text-blue-600 hover:underline">{{ s.name }}</a>
                        </td>
                        <td class="px-4 py-2">{{ s.mention_count }}</td>
                        <td class="px-4 py-2">
                            {% for c in s.concepts[:3] %}
                            <a href="/concept/{{ c }}" class="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded mr-1">{{ c }}</a>
                            {% endfor %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
